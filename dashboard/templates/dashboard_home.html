
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medha Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-HbV3Y1X0GlBqOtElkmE8t3U9sRKWKd6j+/e6N0LA8VCrY3Bi4JYjAOmn0VfW6YOH" crossorigin="anonymous">
    <style>
        body {
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.15), transparent 30%),
                        #f8fafc;
            color: #1f2937;
            font-family: Inter, system-ui, sans-serif;
            min-height: 100vh;
        }
        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .dashboard-subtitle {
            font-size: 1rem;
            opacity: 0.95;
            margin-top: 0.5rem;
        }
        .dashboard-container {
            display: grid;
            gap: 1.5rem;
            padding: 0;
        }
        .nav-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            border: 2px solid transparent;
            text-decoration: none;
            color: #1f2937;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .nav-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);
            border-color: #2563eb;
        }
        .nav-card-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        .nav-card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .nav-card-desc {
            font-size: 0.8rem;
            color: #64748b;
        }
        .nav-card.patients {
            border-left: 5px solid #3b82f6;
        }
        .nav-card.doctors {
            border-left: 5px solid #10b981;
        }
        .nav-card.appointments {
            border-left: 5px solid #f59e0b;
        }
        .nav-card.logout {
            border-left: 5px solid #ef4444;
        }
        .logout-btn {
            background: white;
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            border: 2px solid transparent;
            text-decoration: none;
            color: #ef4444;
            transition: all 0.3s ease;
            text-align: center;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .logout-btn:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #dc2626;
        }
        @media (max-width: 768px) {
            .dashboard-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="container">
            <h1 class="dashboard-title">Welcome to Medha Dashboard</h1>
            <p class="dashboard-subtitle">Manage patients, doctors, and appointments efficiently</p>

        </div>
    </div>

    <div class="container">
        <!-- dashboard navigation cards -->
        <div class="dashboard-container">
            <div class="row g-4 justify-content-center">
                <!-- patients card -->
                <div class="col-md-5 col-lg-4">
                    <a href="/patients/" class="nav-card patients">
                        <div class="nav-card-icon">👥</div>
                        <div class="nav-card-title">Patients</div>
                        <div class="nav-card-desc">Manage patient records and information</div>
                    </a>
                </div>
                <!-- doctors card -->
                <div class="col-md-5 col-lg-4">
                    <a href="/doctors/" class="nav-card doctors">
                        <div class="nav-card-icon">👨‍⚕️</div>
                        <div class="nav-card-title">Doctors</div>
                        <div class="nav-card-desc">View and manage doctor profiles</div>
                    </a>
                </div>
            </div>

            <div class="row g-4 justify-content-center">
                <!-- appointments card -->
                <div class="col-md-5 col-lg-4">
                    <a href="/appointments/" class="nav-card appointments">
                        <div class="nav-card-icon">📅</div>
                        <div class="nav-card-title">Appointments</div>
                        <div class="nav-card-desc">Schedule and manage appointments</div>
                    </a>
                </div>
                <!-- logout card -->
                <div class="col-md-5 col-lg-4">
                    <a href="/logout" class="logout-btn">
                        <div class="nav-card-icon">🚪</div>
                        <div class="nav-card-title">Logout</div>
                        <div class="nav-card-desc">Exit your account safely</div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
