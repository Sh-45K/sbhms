<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Patient - Medha Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-HbV3Y1X0GlBqOtElkmE8t3U9sRKWKd6j+/e6N0LA8VCrY3Bi4JYjAOmn0VfW6YOH" crossorigin="anonymous">
    <style>
        body {
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.15), transparent 30%),
                        #f8fafc;
            color: #1f2937;
            font-family: Inter, system-ui, sans-serif;
            min-height: 100vh;
        }
        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .dashboard-subtitle {
            font-size: 1rem;
            opacity: 0.95;
            margin-top: 0.5rem;
        }
        .back-btn {
            background: #2563eb;
            border: 1px solid #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            display: inline-block;
            font-weight: 500;
        }
        .back-btn:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .form-container {
            background: white;
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            max-width: 500px;
            margin: 0 auto;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn-submit {
            background: #2563eb;
            border: 1px solid #2563eb;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-submit:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        @media (max-width: 768px) {
            .dashboard-title {
                font-size: 1.6rem;
            }
            .form-container {
                padding: 1.5rem;
                margin: 0 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="container">
            <h1 class="dashboard-title">Create Patient</h1>
            <p class="dashboard-subtitle">Add a new patient to the system</p>
        </div>
    </div>

    <div class="container">
        <a href="/patients/" class="back-btn">← Back to Patients</a>
        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Enter patient name" required>
                </div>
                <div class="form-group">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="Enter phone number" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Enter email address" required>
                </div>
                <button type="submit" class="btn-submit">Create Patient</button>
            </form>
        </div>
    </div>
</body>
</html>
