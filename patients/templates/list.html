

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patients List - Medha Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-HbV3Y1X0GlBqOtElkmE8t3U9sRKWKd6j+/e6N0LA8VCrY3Bi4JYjAOmn0VfW6YOH" crossorigin="anonymous">
    <style>
        body {
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.15), transparent 30%),
                        #f8fafc;
            color: #1f2937;
            font-family: Inter, system-ui, sans-serif;
            min-height: 100vh;
        }
        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .dashboard-subtitle {
            font-size: 1rem;
            opacity: 0.95;
            margin-top: 0.5rem;
        }
        .back-btn {
            background: #2563eb;
            border: 1px solid #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
            display: inline-block;
            font-weight: 500;
        }
        .back-btn:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .table-container {
            background: white;
            border-radius: 1.25rem;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        .table {
            margin-bottom: 0;
        }
        .table th, .table td {
            padding: 0.75rem 1rem;
        }
        .table th:nth-child(2), .table td:nth-child(2) { /* Name column */
            min-width: 150px;
        }
        .table th:nth-child(3), .table td:nth-child(3) { /* Phone column */
            min-width: 180px;
        }
        .table tbody tr:hover {
            background-color: #f1f5f9;
        }
        .action-link {
            text-decoration: none;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            margin-right: 1rem;
            display: inline-block;
        }
        .edit-link {
            color: #2563eb;
            border: 1px solid #2563eb;
        }
        .edit-link:hover {
            background-color: #2563eb;
            color: white;
        }
        .delete-link {
            color: #dc2626;
            border: 1px solid #dc2626;
        }
        .delete-link:hover {
            background-color: #dc2626;
            color: white;
        }
        @media (max-width: 768px) {
            .dashboard-title {
                font-size: 1.6rem;
            }
            .table-container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="container">
            <h1 class="dashboard-title">Patients List</h1>
            <p class="dashboard-subtitle">View and manage all patients in the system</p>
        </div>
    </div>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
            <a href="/patients/create" class="back-btn">Create Patient</a>
        </div>
        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in patients %}
                    <tr>
                        <td>{{ p.id }}</td>
                        <td>{{ p.name }}</td>
                        <td>{{ p.phone }}</td>
                        <td>
                            <a href="/patients/{{ p.id }}/edit" class="action-link edit-link">Edit</a>
                            <a href="/patients/{{ p.id }}/delete" class="action-link delete-link">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
