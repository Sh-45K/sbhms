<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medha Signup</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.2), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.2), transparent 30%),
                        #eef4ff;
            font-family: Inter, system-ui, sans-serif;
            color: #1f2937;
        }
        .signup-wrapper {
            width: min(420px, calc(100% - 2rem));
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.12);
        }
        .signup-wrapper h2 {
            margin: 0 0 1.25rem;
            font-size: 1.85rem;
            letter-spacing: -0.03em;
            text-align: center;
        }
        .signup-form {
            display: grid;
            gap: 1rem;
        }
        .signup-form input {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 0.9rem;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .signup-form input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            background: #ffffff;
        }
        .signup-form button {
            width: 100%;
            padding: 0.95rem 1rem;
            border-radius: 999px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .signup-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.2);
        }
        .signup-note {
            margin-top: 1rem;
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="signup-wrapper">
        <h2>Create new account</h2>
        <!-- signup form -->
        <form method="POST" class="signup-form">
            {% csrf_token %}
            <!-- csrf_token -->
            <input type="text" placeholder="Username" name="username" autocomplete="username" />
            <input type="password" placeholder="Password" name="password" autocomplete="new-password" />
            <!-- signup button -->
            <button type="submit">Signup</button>
        </form>
        <p class="signup-note">Medha Hospital account is ready in seconds. No extra steps required.</p>
        <p class="signup-note">Already have an account? <a href="/login" style="color:#2563eb; text-decoration:none; font-weight:700;">Login here</a></p>
    </div>
</body>
</html>
